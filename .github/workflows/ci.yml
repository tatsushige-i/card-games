name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eol-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Node.js ランタイムのサポート期限を確認
      - name: Check Node.js EOL
        run: |
          NODE_MAJOR=$(node -v | cut -d'.' -f1 | tr -d 'v')
          EOL_DATE=$(curl -s "https://endoflife.date/api/nodejs/${NODE_MAJOR}.json" | jq -r '.eol')
          if [[ "$(date +%Y-%m-%d)" > "$EOL_DATE" ]]; then
            echo "::error::Node.js ${NODE_MAJOR} reached EOL on ${EOL_DATE}"
            exit 1
          fi
          echo "Node.js ${NODE_MAJOR} is supported (EOL: ${EOL_DATE})"

      # 本番依存パッケージの既知の脆弱性を検出
      - name: Check npm audit
        run: npm audit --omit=dev --audit-level=moderate

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
